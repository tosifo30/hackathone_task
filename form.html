<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
      <script src="https://cdn.tailwindcss.com"></script>
      <script src="form.js" async></script>
    
</head>
<body>
    <div class="min-h-screen flex items-center justify-center bg-gray-300 z-10 " id="SignUp">
  <form action="" class="w-full max-w-md bg-white p-6 rounded-lg shadow-md flex flex-col  gap-[30px]">
    
    <div>
        <h1 class="text-[25px] text-center text-yellow-500 font-medium">SignUp here</h1>
      <label for="name" class="block mb-1 font-medium text-gray-700">
        Name:
      </label>
      <input 
        type="text" 
        id="name" 
        name="name"
        placeholder="Enter your name"
        class="w-full px-3 py-2 border rounded-md focus:outline-none focus:ring-2 focus:ring-yellow-500"
      >
    </div>

    <div>
      <label for="email" class="block mb-1 font-medium text-gray-700">
        Email:
      </label>
      <input 
        type="email" 
        id="email" 
        name="email"
        placeholder="Enter your email"
        class="w-full px-3 py-2 border rounded-md focus:outline-none focus:ring-2 focus:ring-yellow-500"
      >
    </div>

    <div>
      <label for="confirmEmail" class="block mb-1 font-medium text-gray-700">
        Confirm Email:
      </label>
      <input 
        type="email" 
        id="confirmEmail" 
        name="confirmEmail"
        placeholder="Confirm your email"
        class="w-full px-3 py-2 border rounded-md focus:outline-none focus:ring-2 focus:ring-yellow-500"
      >
    </div>

    
    <button 
    type="submit"
    class="w-full bg-yellow-600 text-white py-2 rounded-md hover:bg-yellow-700 transition duration-300"
    >
    Submit
</button>
<div>
    <p>Already have a accout <a id="click" href="" class="text-blue-700 underline">login here</a></p>
</div>

</form>
</div>


<!-- login form -->




<div class="min-h-screen flex items-center justify-center bg-gray-200 " id="hide" >

  <form class="bg-white p-8 rounded-lg shadow-md w-full max-w-sm space-y-4 " id="login">

    <h1 class="text-2xl font-bold text-center text-yellow-700">
      Login
    </h1>

    <div class="flex flex-col">
      <label for="name" class="mb-1 text-gray-700">Name</label>
      <input 
        type="text" 
        id="name"
        class="px-3 py-2 border rounded-md focus:outline-none focus:ring-2 focus:ring-yellow-500"
        placeholder="Enter your name"
      >
    </div>

    <div class="flex flex-col">
      <label for="email" class="mb-1 text-gray-700">Email</label>
      <input 
        type="email" 
        id="email"
        class="px-3 py-2 border rounded-md focus:outline-none focus:ring-2 focus:ring-yellow-500"
        placeholder="Enter your email"
      >
    </div>

    <button 
      type="submit"
      class="w-full bg-yellow-600 text-white py-2 rounded-md 
             hover:bg-yellow-800 transition duration-300">
      Sign In
    </button>

  </form>

</div>

  </div>

</body>
</html>
